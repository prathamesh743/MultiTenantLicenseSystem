services:
  license-service:
    build:
      context: .
      dockerfile: LicenseService/Dockerfile
    ports:
      - "5001:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=LicenseDb;User Id=sa;Password=Your_Password123;TrustServerCertificate=True
      - ConnectionStrings__HangfireConnection=Server=sqlserver;Database=LicenseDb;User Id=sa;Password=Your_Password123;TrustServerCertificate=True
      - Database__AutoMigrate=true
      - Jwt__Issuer=LicenseSystem
      - Jwt__Audience=LicenseSystem
      - Jwt__Key=DockerDevKey_ReplaceMe_ThisMustBeLongEnough_For_HS256_2026
      - Seed__AdminUsername=admin
      - Seed__AdminPassword=Admin123!
      - Seed__AdminTenantId=tenant1
    depends_on:
      - sqlserver

  document-service:
    build:
      context: .
      dockerfile: DocumentService/Dockerfile
    ports:
      - "5002:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=LicenseDb;User Id=sa;Password=Your_Password123;TrustServerCertificate=True
      - Database__AutoMigrate=true
      - Jwt__Issuer=LicenseSystem
      - Jwt__Audience=LicenseSystem
      - Jwt__Key=DockerDevKey_ReplaceMe_ThisMustBeLongEnough_For_HS256_2026
    volumes:
      - document_uploads:/app/Uploads
    depends_on:
      - sqlserver

  notification-service:
    build:
      context: .
      dockerfile: NotificationService/Dockerfile
    ports:
      - "5003:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=LicenseDb;User Id=sa;Password=Your_Password123;TrustServerCertificate=True
      - Database__AutoMigrate=true
      - Jwt__Issuer=LicenseSystem
      - Jwt__Audience=LicenseSystem
      - Jwt__Key=DockerDevKey_ReplaceMe_ThisMustBeLongEnough_For_HS256_2026
    depends_on:
      - sqlserver

  payment-service:
    build:
      context: .
      dockerfile: PaymentService/Dockerfile
    ports:
      - "5004:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=LicenseDb;User Id=sa;Password=Your_Password123;TrustServerCertificate=True
      - Database__AutoMigrate=true
      - Jwt__Issuer=LicenseSystem
      - Jwt__Audience=LicenseSystem
      - Jwt__Key=DockerDevKey_ReplaceMe_ThisMustBeLongEnough_For_HS256_2026
    depends_on:
      - sqlserver

  api-gateway:
    build:
      context: .
      dockerfile: ApiGateway/Dockerfile
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:80
      - Jwt__Issuer=LicenseSystem
      - Jwt__Audience=LicenseSystem
      - Jwt__Key=DockerDevKey_ReplaceMe_ThisMustBeLongEnough_For_HS256_2026
      - Ocelot__ConfigFile=ocelot.docker.json
    depends_on:
      - license-service
      - document-service
      - notification-service
      - payment-service

  frontend:
    build:
      context: .
      dockerfile: LicenseFrontend/Dockerfile
    ports:
      - "5005:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:80
      - GatewayUrl=http://api-gateway
      - Jwt__Issuer=LicenseSystem
      - Jwt__Audience=LicenseSystem
      - Jwt__Key=DockerDevKey_ReplaceMe_ThisMustBeLongEnough_For_HS256_2026
    depends_on:
      - api-gateway

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Your_Password123
    ports:
      - "1433:1433"
    volumes:
      - sqlserverdata:/var/opt/mssql

volumes:
  sqlserverdata:
  document_uploads:
